<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mini Jogo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    h1 {
      position: absolute;
      color: #2c3e50;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
  </style>
</head>
<body>
  <h1 id="titulo">Tente me clicar!</h1>

  <script>
    const titulo = document.getElementById("titulo");

    // posição inicial
    titulo.style.left = "50%";
    titulo.style.top = "50%";
    titulo.style.transform = "translate(-50%, -50%)";

    titulo.addEventListener("mouseover", () => {
      const largura = window.innerWidth - titulo.offsetWidth;
      const altura = window.innerHeight - titulo.offsetHeight;

      // gera posição aleatória
      const novaX = Math.random() * largura;
      const novaY = Math.random() * altura;

      titulo.style.left = novaX + "px";
      titulo.style.top = novaY + "px";
      titulo.style.transform = "none";
    });

    titulo.addEventListener("click", () => {
      alert("Parabéns, você conseguiu clicar!");
    });
  </script>
</body>
</html>
