<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Mini Jogo</title> <style> body { font-family: 'Comic Sans MS', cursive, sans-serif; background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; user-select: none; } h1 { position: absolute; color: #e0e0e0; font-size: 4rem; font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); cursor: pointer; transition: transform 0.3s ease, color 0.3s ease; padding: 10px 20px; border-radius: 12px; background: rgba(255, 255, 255, 0.1); box-shadow: 0 8px 15px rgba(0,0,0,0.7); user-select: none; } h1:hover { color: #ffd966; transform: scale(1.1); box-shadow: 0 12px 20px rgba(255, 217, 102, 0.8); } h1:active { animation: pulse 0.3s ease; color: #ff6f61; box-shadow: 0 0 20px #ff6f61; } @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } } </style> </head> <body> <h1 id="titulo">Tente me clicar!</h1>

<script> const titulo = document.getElementById("titulo");

// posição inicial
titulo.style.left = "50%";
titulo.style.top = "50%";
titulo.style.transform = "translate(-50%, -50%)";

titulo.addEventListener("mouseover", () => {
  const largura = window.innerWidth - titulo.offsetWidth;
  const altura = window.innerHeight - titulo.offsetHeight;

  // gera posição aleatória
  const novaX = Math.random() * largura;
  const novaY = Math.random() * altura;

  titulo.style.left = novaX + "px";
  titulo.style.top = novaY + "px";
  titulo.style.transform = "none";
});

titulo.addEventListener("click", () => {
  alert("Parabéns, você conseguiu clicar!");
});

</script> </body> </html>
